# Merge with docker-compose.yml for local image builds only:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml build
#
# Requires docker/secrets/composer_auth.json (see docker/secrets/composer_auth.json.example).
# Runtime stack is docker-compose.yml; use docker/sample.env in Portainer.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - composer_auth

secrets:
  composer_auth:
    file: ./docker/secrets/composer_auth.json
