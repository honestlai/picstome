# Merge with docker-compose.yml for local builds only:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml build
#
# Requires docker/secrets/composer_auth.json (see docker/secrets/composer_auth.json.example).
# Pushed image default: ghcr.io/honestlai/picstome (see PICSTOME_IMAGE in docker-compose.yml).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - composer_auth

secrets:
  composer_auth:
    file: ./docker/secrets/composer_auth.json
