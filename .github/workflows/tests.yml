# Pest runs when Flux credentials exist. Otherwise the skip job passes (no failure emails).

name: tests

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      has_flux: ${{ steps.check.outputs.flux }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.FLUX_USERNAME }}" ] && [ -n "${{ secrets.FLUX_LICENSE_KEY }}" ]; then
            echo "flux=yes" >> "$GITHUB_OUTPUT"
          else
            echo "flux=no" >> "$GITHUB_OUTPUT"
          fi

  skip-without-flux:
    name: Skip (Flux secrets not configured)
    needs: prepare
    if: needs.prepare.outputs.has_flux == 'no'
    runs-on: ubuntu-latest
    steps:
      - name: Notice
        run: |
          echo "::notice::Add repository secrets FLUX_USERNAME and FLUX_LICENSE_KEY to enable tests."
          exit 0

  ci:
    name: Pest
    needs: prepare
    if: needs.prepare.outputs.has_flux == 'yes'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm i

      - name: Install Playwright
        run: npm install playwright@latest && npx playwright install

      - name: Add Flux credentials
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Build assets
        run: npm run build

      - name: Run tests
        run: ./vendor/bin/pest
