# -----------------------------------------------------------------------------
# What this file does (and does NOT do)
# -----------------------------------------------------------------------------
# Runs on GitHub-hosted runners on push (see `on:`) or workflow_dispatch. Builds
# the Dockerfile and pushes to GHCR. Your running Picstome container never executes
# this workflow. Requires FLUX_USERNAME + FLUX_LICENSE_KEY; otherwise skip job passes.
#
# Package visibility: https://docs.github.com/en/packages/learn-github-packages/configuring-a-packages-access-control-and-visibility
# -----------------------------------------------------------------------------

name: Publish Docker image to GHCR

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      has_flux: ${{ steps.check.outputs.flux }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.FLUX_USERNAME }}" ] && [ -n "${{ secrets.FLUX_LICENSE_KEY }}" ]; then
            echo "flux=yes" >> "$GITHUB_OUTPUT"
          else
            echo "flux=no" >> "$GITHUB_OUTPUT"
          fi

  skip-without-flux:
    name: Skip (Flux secrets not configured)
    needs: prepare
    if: needs.prepare.outputs.has_flux == 'no'
    runs-on: ubuntu-latest
    steps:
      - name: Notice
        run: |
          echo "::notice::Add FLUX_USERNAME and FLUX_LICENSE_KEY to build and push to GHCR."
          exit 0

  build-and-push:
    name: Build and push image
    needs: prepare
    if: needs.prepare.outputs.has_flux == 'yes'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Install PHP dependencies (vendor/ for Docker bind mount)
        run: |
          composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"
          composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader --no-scripts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
