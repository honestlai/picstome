# Builds the Dockerfile and pushes the image to ghcr.io/<owner>/<repo> from GitHub Actions only.
# Picstome runtime containers do not push images; they pull this image to deploy.
#
# After the first successful run, set the package visibility to Private:
# https://docs.github.com/en/packages/learn-github-packages/configuring-a-packages-access-control-and-visibility
#
# Pull on a server (classic PAT with read:packages, or fine-grained token with Packages read):
#   echo TOKEN | docker login ghcr.io -u USERNAME --password-stdin

name: Publish Docker image to GHCR

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Write Composer auth for BuildKit
        run: |
          jq -nc \
            --arg u "${{ secrets.FLUX_USERNAME }}" \
            --arg p "${{ secrets.FLUX_LICENSE_KEY }}" \
            '{ "http-basic": { "composer.fluxui.dev": { "username": $u, "password": $p } } }' \
            > composer-auth.docker.json

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secret-files: |
            composer_auth=./composer-auth.docker.json

      - name: Remove Composer auth file
        if: always()
        run: rm -f composer-auth.docker.json
